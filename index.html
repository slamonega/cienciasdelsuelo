<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia de Conservación y Física de Suelos - UNS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-info">
            <h1>Trivia Conservación de Suelos</h1>
            <p>Día Nacional de la Conservación del Suelo (7 de Julio)</p>
            <p id="activity-counter"></p>
        </div>
        <div class="progress-wrapper">
            <span>Progreso</span>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
        </div>
    </header>

    <main>
        <div class="activity-header">
            <h2 id="activity-title">Cargando...</h2>
            <p id="activity-time"></p>
            <p id="activity-objective"></p>
        </div>

        <div id="media-container" class="media-area" style="display:none; margin-bottom: 1.5rem;"></div>

        <div id="activity-container" class="content-area">
            <!-- El contenido dinámico se inyectará aquí -->
        </div>

        <div id="feedback" class="feedback"></div>

        <div class="controls">
            <button id="btn-prev" class="secondary" onclick="prevActivity()">Anterior</button>
            <button id="btn-check" class="primary" onclick="checkAnswer()">Verificar</button>
            <button id="btn-next" class="primary" onclick="nextActivity()" disabled>Siguiente</button>
        </div>
    </main>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="xapi-helper.js"></script>
    <script src="course.js"></script>
</body>
</html>
