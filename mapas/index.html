<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humedad de Suelo SAOCOM + Sentinel-2 - Leaflet</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body, #map {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #info-panel {
            position: absolute;
            bottom: 30px;
            left: 10px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            font-family: Arial, sans-serif;
            font-size: 12px;
            max-width: 280px;
        }
        #info-panel h4 { margin: 0 0 5px 0; }
        #info-panel p { margin: 3px 0; }
        #info-panel .leyenda { margin-top: 6px; border-top: 1px solid #ddd; padding-top: 4px; font-size: 11px; color: #555; }
        .leaflet-control-layers { overflow-y: auto; max-height: 80vh; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="info-panel">
        <h4>Humedad de Suelo SAOCOM</h4>
        <p>Datos CONAE - Estimación del contenido volumétrico de agua en el suelo (promedio hasta 50cm).</p>
        <div class="leyenda" id="layer-desc">Seleccioná una capa base y activá las superpuestas disponibles.</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // ---- TileLayer custom para ESRI Sentinel-2 ImageServer ----
        L.TileLayer.SentinelIndex = L.TileLayer.extend({
            options: {
                renderingRule: '{"rasterFunction":"Natural Color with DRA"}',
                maxZoom: 14,
                minZoom: 2,
                attribution: 'Source: Esri, European Commission, ESA, AWS'
            },

            initialize: function (options) {
                L.TileLayer.prototype.initialize.call(this, undefined, options);
                this._esriUrl = 'https://sentinel.arcgis.com/arcgis/rest/services/Sentinel2/ImageServer/exportImage';
                this._worldMetersMax = 20037508.342789244;
                this._worldMetersRange = this._worldMetersMax * 2;
            },

            getTileUrl: function (coords) {
                var z = coords.z;
                var x = coords.x;
                var y = coords.y;
                var ts = this.options.tileSize || 256;
                var numTiles = Math.pow(2, z);
                var tws = this._worldMetersRange / numTiles;

                var xmin = -this._worldMetersMax + x * tws;
                var xmax = xmin + tws;
                var ymax = this._worldMetersMax - y * tws;
                var ymin = ymax - tws;

                var bbox = [xmin.toFixed(4), ymin.toFixed(4), xmax.toFixed(4), ymax.toFixed(4)].join(',');
                var rule = encodeURIComponent(this.options.renderingRule);

                return this._esriUrl
                    + '?bbox=' + bbox
                    + '&bboxSR=102100'
                    + '&size=' + ts + ',' + ts
                    + '&imageSR=102100'
                    + '&format=png'
                    + '&interpolation=RSP_BilinearInterpolation'
                    + '&renderingRule=' + rule
                    + '&f=image';
            }
        });

        L.tileLayer.sentinelIndex = function (options) {
            return new L.TileLayer.SentinelIndex(options);
        };
        // ----------------------------------------------------------

        // 1. Inicializar el mapa
        var map = L.map('map').setView([-36.5, -60.5], 6);

        // 2. Mapas base
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        });

        var sentinel2 = L.tileLayer('https://tiles.maps.eox.at/wmts/1.0.0/s2cloudless-2025_3857/default/g/{z}/{y}/{x}.jpg', {
            maxZoom: 18,
            attribution: 'Sentinel-2 cloudless - https://s2maps.eu by EOX IT Services GmbH (Contains modified Copernicus Sentinel data 2025)'
        });

        var ignArgenmap = L.tileLayer('https://wms.ign.gob.ar/geoserver/gwc/service/tms/1.0.0/capabaseargenmap@EPSG:3857@png/{z}/{x}/{y}.png', {
            maxZoom: 18,
            tms: true,
            attribution: '© <a href="https://www.ign.gob.ar">IGN Argentina</a>'
        });

        osm.addTo(map);

        // 3. Capas Sentinel-2 derivadas para ciencias del suelo (vía ESRI ImageServer)
        var s2NDVI = L.tileLayer.sentinelIndex({
            renderingRule: '{"rasterFunction":"NDVI Colormap"}',
            maxZoom: 14,
            minZoom: 2,
            attribution: 'NDVI | Source: Esri, European Commission, ESA, AWS'
        });

        var s2Infrared = L.tileLayer.sentinelIndex({
            renderingRule: '{"rasterFunction":"Color Infrared with DRA"}',
            maxZoom: 14,
            minZoom: 2,
            attribution: 'Color IR | Source: Esri, European Commission, ESA, AWS'
        });

        var s2Agriculture = L.tileLayer.sentinelIndex({
            renderingRule: '{"rasterFunction":"Agriculture with DRA"}',
            maxZoom: 14,
            minZoom: 2,
            attribution: 'Agriculture | Source: Esri, European Commission, ESA, AWS'
        });

        var s2SWIR = L.tileLayer.sentinelIndex({
            renderingRule: '{"rasterFunction":"Short-wave Infrared with DRA"}',
            maxZoom: 14,
            minZoom: 2,
            attribution: 'SWIR | Source: Esri, European Commission, ESA, AWS'
        });

        var s2Geology = L.tileLayer.sentinelIndex({
            renderingRule: '{"rasterFunction":"Geology with DRA"}',
            maxZoom: 14,
            minZoom: 2,
            attribution: 'Geology | Source: Esri, European Commission, ESA, AWS'
        });

        // 4. WMS SAOCOM Humedad de Suelo
        var saocomHumedad = L.tileLayer.wms('https://geoservicios3.conae.gov.ar/geoserver/HumedadDeSuelos/wms', {
            layers: 'DSS_MSMKR_1',
            styles: 'estilo_DSS_MSM',
            format: 'image/png',
            transparent: true,
            version: '1.1.1',
            attribution: '© CONAE - Misión SAOCOM',
            opacity: 0.75
        }).addTo(map);

        // 5. Control de capas
        var baseMaps = {
            "OpenStreetMap": osm,
            "Sentinel-2 Cloudless 2025": sentinel2,
            "IGN Argentina Argenmap": ignArgenmap
        };

        var overlayMaps = {
            "Humedad de Suelo SAOCOM": saocomHumedad,
            "S2 NDVI (índice de vegetación)": s2NDVI,
            "S2 Falso Color IR (vegetación)": s2Infrared,
            "S2 Agricultura (SWIR-NIR-Azul)": s2Agriculture,
            "S2 SWIR (humedad/mineralogía)": s2SWIR,
            "S2 Geología (composición suelo)": s2Geology
        };

        L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(map);

        // 6. Actualizar descripción según capa activa
        var descripciones = {
            "S2 NDVI (índice de vegetación)": "NDVI: (NIR-Rojo)/(NIR+Rojo). Evalúa vigor vegetal, cobertura del suelo y biomasa. Útil para detectar suelos desnudos, estrés hídrico y residuos de cosecha.",
            "S2 Falso Color IR (vegetación)": "Falso Color IR (NIR, Rojo, Verde). La vegetación sana aparece en rojo/violeta. Los suelos desnudos en tonos claros. Ideal para delimitar áreas con cobertura vegetal.",
            "S2 Agricultura (SWIR-NIR-Azul)": "Agricultura (SWIR1, NIR, Azul). Vegetación vigorosa en verde brillante, suelos desnudos en marrón. Resalta diferencias en humedad superficial y contenido de arcilla.",
            "S2 SWIR (humedad/mineralogía)": "SWIR (SWIR2, SWIR1, Rojo). Sensible al contenido de agua en suelo y minerales arcillosos. Útil para mapear humedad edáfica y composición mineralógica.",
            "S2 Geología (composición suelo)": "Geología (SWIR2, SWIR1, Azul). Destaca diferencias en composición mineral del suelo, óxidos de hierro y carbonatos. Ayuda a identificar materiales parentales.",
            "Humedad de Suelo SAOCOM": "Humedad del perfil de suelo hasta 50cm (producto krigeado). Estimación del contenido volumétrico de agua (m³/m³) derivado de datos SAOCOM banda-L."
        };

        var layerDesc = document.getElementById('layer-desc');

        map.on('overlayadd', function (e) {
            var d = descripciones[e.name];
            if (d) layerDesc.textContent = d;
        });
    </script>
</body>
</html>
